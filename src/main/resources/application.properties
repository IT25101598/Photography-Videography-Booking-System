# =============================================================
# application.properties
# Spring Boot configuration for the Review Management module
# =============================================================

# --- Server ---
server.port=8080

# --- JSP View Resolver ---
# These two properties tell Spring MVC where to find JSP files.
# Every view name returned by a controller (e.g., "submit_review")
# is wrapped as:  /WEB-INF/views/submit_review.jsp
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# --- File Storage ---
reviews.file.path=reviews.txt
users.file.path=users.txt
packages.file.path=packages.txt
bookings.file.path=bookings.txt
staff.file.path=staff.txt
announcements.file.path=announcements.txt


# --- Logging (optional but useful for debugging file I/O) ---
logging.level.com.reviewapp=DEBUG

